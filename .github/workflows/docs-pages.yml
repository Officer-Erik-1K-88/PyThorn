name: Publish Versioned Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/docs-pages.yml"
      - "info/**"
      - "docs/**"
      - "scripts/build_versioned_docs.py"
      - "README.rst"
      - "CHANGELOG.rst"
      - "pyproject.toml"
      - "setup.py"
      - "requirements.txt"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docs Site
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install docs builder
        run: python -m pip install --upgrade sphinx

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build versioned docs
        run: python scripts/build_versioned_docs.py --output site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy Docs Site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
